name: kkbox-worker


on:

  workflow_dispatch:

    inputs:

      start:

        required: true
        type: string



concurrency:

  group: kkbox-worker-${{ github.event.inputs.start }}

  cancel-in-progress: false



jobs:


  scan:


    runs-on: ubuntu-latest



    steps:


    - name: Checkout
      uses: actions/checkout@v4



    - name: Setup Python

      uses: actions/setup-python@v5

      with:

        python-version: "3.10"



    - name: Install dependencies

      run: |

        sudo apt update

        pip install requests
        pip install pytz
        pip install python-telegram-bot
        pip install PyGithub
        pip install paddleocr
        pip install paddlepaddle
        pip install pillow




    - name: Clone private repo

      env:

        TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}

      run: |

        git clone https://x-access-token:${TOKEN}@github.com/iamCristYE/kkbox.git



    - name: Run scanner

      env:

        github_token: ${{ secrets.PRIVATE_REPO_TOKEN }}

        bot_token: ${{ secrets.BOT_TOKEN }}

      run: |


        cd kkbox

        python kkbox.py ${{ github.event.inputs.start }}